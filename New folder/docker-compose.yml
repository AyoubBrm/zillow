version: "3.9"

services:
  # ─── PostgreSQL with pgvector ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ledgerai-postgres
    environment:
      POSTGRES_USER: ledgerai
      POSTGRES_PASSWORD: ledgerai_dev_password
      POSTGRES_DB: ledgerai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerai"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ledgerai-network

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ledgerai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ledgerai-network

  # ─── MinIO (S3-compatible object storage) ───────────────
  minio:
    image: minio/minio:latest
    container_name: ledgerai-minio
    environment:
      MINIO_ROOT_USER: ledgerai
      MINIO_ROOT_PASSWORD: ledgerai_dev_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledgerai-network

  # ─── FastAPI Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgerai-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://ledgerai:ledgerai_dev_password@postgres:5432/ledgerai
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=ledgerai
      - MINIO_SECRET_KEY=ledgerai_dev_password
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ledgerai-network

  # ─── Celery Worker ──────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgerai-celery-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://ledgerai:ledgerai_dev_password@postgres:5432/ledgerai
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    networks:
      - ledgerai-network

  # ─── Celery Beat (Scheduler) ────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgerai-celery-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://ledgerai:ledgerai_dev_password@postgres:5432/ledgerai
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    networks:
      - ledgerai-network

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ledgerai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - ledgerai-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ledgerai-network:
    driver: bridge
